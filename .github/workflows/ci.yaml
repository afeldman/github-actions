name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Python
        if: hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        if: hashFiles('package.json') != ''
        uses: oven-sh/setup-bun@v2

      - name: Lint
        run: .github/scripts/lint.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        if: hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        if: hashFiles('package.json') != ''
        uses: oven-sh/setup-bun@v2

      - name: Test
        run: .github/scripts/test.sh

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        if: hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        if: hashFiles('package.json') != ''
        uses: oven-sh/setup-bun@v2

      - name: Build
        run: .github/scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
