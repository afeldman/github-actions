name: "Node.js Build Artifact"

on:
  workflow_call:
    inputs:
      package_name:
        description: "Name of the package (used for artifact naming and download pattern)"
        required: true
        type: string

      node_version:
        description: "Node.js version"
        required: false
        default: ""
        type: string

      package_manager:
        description: "Package manager (yarn|bun|npm)"
        required: false
        default: "yarn"
        type: string

      build_command:
        description: "Build command script name"
        required: false
        default: "build"
        type: string

      enable:
        description: "Enable Node.js build"
        required: false
        default: true
        type: boolean

      only_on_tag:
        description: "Run only on git tags"
        required: false
        default: false
        type: boolean

jobs:
  node-build:
    name: "Build Node.js package"
    runs-on: ubuntu-latest

    if: ${{ inputs.enable && ( !inputs.only_on_tag || startsWith(github.ref, 'refs/tags/') ) }}

    outputs:
      artifact_created: ${{ steps.check.outputs.exists }}

    steps:
      ##############################################################################
      # Checkout
      ##############################################################################
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      ##############################################################################
      # Node.js Setup
      ##############################################################################
      - name: "Setup Node.js"
        uses: afeldman/github-actions/actions/setup-node@feature/node
        with:
          node_version: ${{ inputs.node_version }}
          package_manager: ${{ inputs.package_manager }}

      ##############################################################################
      # Check / download existing release
      ##############################################################################
      - id: release_check
        uses: afeldman/github-actions/actions/check-release@main

      - name: "Download package from existing release"
        if: steps.release_check.outputs.release_exists == 'true'
        uses: afeldman/github-actions/actions/download-release@main
        with:
          tag: ${{ steps.release_check.outputs.tag }}
          pattern: ${{ inputs.package_name }}

      ##############################################################################
      # Build
      ##############################################################################
      - name: "Build package"
        if: steps.release_check.outputs.release_exists != 'true'
        run: ${{ inputs.package_manager }} run ${{ inputs.build_command }}

      ##############################################################################
      # Prepare artifact
      ##############################################################################
      - id: prepare
        if: steps.release_check.outputs.release_exists != 'true'
        uses: afeldman/github-actions/actions/prepare-artifact@feature/node
        with:
          artifact_type: node

      ##############################################################################
      # Check artifact exists
      ##############################################################################
      - id: check
        run: |
          if [ -d "artifact/dist" ]; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "path=artifact/dist" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      ##############################################################################
      # Upload artifact
      ##############################################################################
      - name: "Upload artifact"
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ github.sha }}-build
          path: artifact/dist
          retention-days: 7
